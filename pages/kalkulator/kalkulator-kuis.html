<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kalkulator Stres</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-[#F0F3FA] min-h-screen w-full flex items-center justify-center p-4">

  <div class="bg-white w-full max-w-2xl rounded-3xl shadow-md p-6 md:p-8 relative min-h-[500px] flex flex-col justify-between">
    
    <div class="flex items-center justify-between mb-6 h-8">
      <button id="btn-cancel-quiz" class="text-gray-600 hover:text-gray-900 transition flex items-center gap-1 font-medium text-sm cursor-pointer">
        <i data-lucide="chevron-left" class="w-5 h-5"></i>
      </button>
      <span id="question-indicator" class="text-xs font-bold text-gray-400 tracking-wider bg-gray-50 px-3 py-1 rounded-full">
        PERTANYAAN 1/10
      </span>
    </div>

    <div class="flex-1 flex flex-col justify-center">
      <h2 id="question-text" class="text-base md:text-lg font-semibold text-gray-800 text-center mb-6 px-4 leading-relaxed">
        Memuat pertanyaan...
      </h2>
      <div id="options-container" class="flex flex-col gap-3 max-w-md mx-auto w-full mb-8">
        </div>
    </div>

    <div class="flex items-center justify-between max-w-md mx-auto w-full mb-6">
      <button id="btn-nav-back" class="px-6 py-2 rounded-xl text-sm font-semibold border border-gray-300 text-gray-600 hover:bg-gray-50 transition disabled:opacity-40 disabled:pointer-events-none cursor-pointer">
        Kembali
      </button>
      <button id="btn-nav-next" class="px-6 py-2 rounded-xl text-sm font-semibold bg-[#5B84C4] text-white hover:bg-[#4A73B3] transition cursor-pointer">
        Selanjutnya
      </button>
    </div>

    <div class="w-full">
      <div class="w-full bg-gray-100 h-1.5 rounded-full overflow-hidden">
        <div id="progress-bar-fill" class="bg-[#5B84C4] h-full transition-all duration-300" style="width: 10%;"></div>
      </div>
    </div>

  </div>

  <script src="kalkulator.js"></script>
  <script>
    // Inisialisasi ikon Lucide agar muncul
    lucide.createIcons();
  </script>
</body>
</html>
