<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="icon" type="image/png" href="/public/logo kita.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="./PendaftaranPasienBaru.css">
    <link rel="stylesheet" href="../../public/global.css">
    <style>
        .mata {
            --color-1: #fff;
            --color-2: #0d161b;
            --size: 1px;

            position: relative;
            width: calc(108 * var(--size));
            display: flex;
            justify-content: space-between;
        }

        .mata::after,
        .mata::before {
            content: '';
            display: inline-block;
            width: calc(48 * var(--size));
            height: calc(48 * var(--size));
            background-color: var(--color-1);
            background-image: radial-gradient(circle calc(14 * var(--size)),
                    var(--color-2) 100%,
                    transparent 0);
            background-repeat: no-repeat;
            border-radius: 50%;
            animation:
                eyeMove 10s infinite,
                blink 10s infinite;
        }

        @keyframes eyeMove {

            0%,
            10% {
                background-position: 0 0;
            }

            13%,
            40% {
                background-position: calc(-15 * var(--size)) 0;
            }

            43%,
            70% {
                background-position: calc(15 * var(--size)) 0;
            }

            73%,
            90% {
                background-position: 0 calc(15 * var(--size));
            }

            93%,
            100% {
                background-position: 0 0;
            }
        }

        @keyframes blink {

            0%,
            10%,
            12%,
            20%,
            22%,
            40%,
            42%,
            60%,
            62%,
            70%,
            72%,
            90%,
            92%,
            98%,
            100% {
                height: calc(48 * var(--size));
            }

            11%,
            21%,
            41%,
            61%,
            71%,
            91%,
            99% {
                height: calc(18 * var(--size));
            }
        }
    </style>
    <title>Document</title>
</head>

<body class="bg-[#F0F3FA] w-full h-screen flex justify-center items-center">
    <div class="card boxshadow">
        <div class="overflow-y-hidden h-[80px]">
            <div id="movercard" class="relative bottom-20 transition-transform duration-500 ease-in-out">
                <div class="flex justify-center text-green-600 ">
                    <svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                        class="lucide lucide-circle-check-icon lucide-circle-check">
                        <circle cx="12" cy="12" r="10" />
                        <path d="m9 12 2 2 4-4" />
                    </svg>
                </div>
                <div class="w-full h-[80px] flex justify-center items-center trans">
                    <span class="mata"></span>
                </div>
            </div>
        </div>
        <div class="overflow-y-hidden h-6">
            <div class="flex flex-col text-center relative transition-transform duration-500 ease-in-out" id="text">
                <label for="">Mencoba mengambil bukti pembayaran</label>
                <label for="">menghubungi server</label>
                <label for="">Mendapatkan informasi</label>
                <label for="">Sedang memverifikasi pembayarann</label>
                <label for="" class="text-green-600">Pembayaran berhasil</label>
            </div>
        </div>
    </div>
    <script>
        const text = document.getElementById("text");
        const totalItems = text.children.length;
        const itemHeight = 33;
        let currentIndex = 0;
        const movercard = document.getElementById("movercard")


        const timer = [1, 3, 2, 2, 0];

        if (timer.length !== totalItems) {
            alert("Error: Jumlah timer dan total item teks tidak sama!");
        } else {
            jalankanAnimasi(0);
        }
        setTimeout(() => {
            movercard.style.transform = 'translateY(80px)'
            console.log("done tf")
            setTimeout(() => {
                window.location.assign("/pages/pendaftaran/ticket/index.html")
            }, 250);
        }, ((timer.reduce((prev, cur, index) => prev + cur + 0.5)) * 1000) + 250)
        function jalankanAnimasi(index) {
            if (index >= totalItems - 1) return;
            const delay = timer[index] * 1000;

            setTimeout(() => {
                currentIndex++;
                text.style.transform = `translateY(-${currentIndex * itemHeight}px)`;
                jalankanAnimasi(currentIndex);
            }, delay);
        }
    </script>
</body>

</html>
